<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0F19" />
    <meta name="description" content="Dhanalakshmi Heavy Driving School — Professional heavy vehicle driving training management system" />
    <meta name="robots" content="noindex, nofollow" />
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Dhanalakshmi Heavy Driving School</title>
    <!-- Prevent FOUC flash on dark theme -->
    <script>
      // Apply dark class before React mounts to prevent flash
      try {
        const theme = localStorage.getItem('dds-theme') || 'dark';
        document.documentElement.classList.toggle('dark', theme === 'dark');
      } catch (e) { /* noop */ }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
